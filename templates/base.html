<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dream Visualizer AI — Transform your dreams into cinematic AI experiences" />
  <title>{% block title %}Dream Visualizer AI{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <!-- Base styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />

  <style>
    /* ── Design tokens ──────────────────────────────────────────────────── */
    :root {
      --ink:        #0a0a14;
      --ink-2:      #12121f;
      --ink-3:      #1a1a2e;
      --surface:    rgba(255,255,255,0.04);
      --surface-2:  rgba(255,255,255,0.08);
      --border:     rgba(255,255,255,0.08);
      --border-2:   rgba(255,255,255,0.14);

      --indigo:     #6366f1;
      --violet:     #8b5cf6;
      --rose:       #f43f5e;
      --amber:      #f59e0b;
      --cyan:       #06b6d4;
      --emerald:    #10b981;

      --grad-primary:  linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #f43f5e 100%);
      --grad-glow:     linear-gradient(135deg, rgba(99,102,241,.35) 0%, rgba(139,92,246,.35) 100%);

      --font-display: 'Cinzel', serif;
      --font-body:    'Raleway', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;

      --radius:    12px;
      --radius-lg: 20px;
      --radius-xl: 32px;

      --shadow-glow:   0 0 40px rgba(99,102,241,.25);
      --shadow-card:   0 8px 32px rgba(0,0,0,.45);
      --shadow-float:  0 20px 60px rgba(0,0,0,.6);

      --transition: all .3s cubic-bezier(.4,0,.2,1);
      --nav-h:    68px;
    }

    /* ── Reset / base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--ink);
      color: rgba(255,255,255,.88);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button { font-family: var(--font-body); cursor: pointer; border: none; outline: none; }

    /* ── Animated nebula background ────────────────────────────────────── */
    .bg-nebula {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-nebula::before {
      content: '';
      position: absolute; width: 800px; height: 800px;
      top: -200px; left: -200px;
      background: radial-gradient(circle, rgba(99,102,241,.18) 0%, transparent 70%);
      animation: nebula-drift 18s ease-in-out infinite alternate;
    }
    .bg-nebula::after {
      content: '';
      position: absolute; width: 600px; height: 600px;
      bottom: -100px; right: -100px;
      background: radial-gradient(circle, rgba(139,92,246,.15) 0%, transparent 70%);
      animation: nebula-drift 22s ease-in-out infinite alternate-reverse;
    }
    .bg-nebula-mid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .bg-nebula-mid::before {
      content: '';
      position: absolute; width: 500px; height: 500px;
      top: 40%; left: 40%; transform: translate(-50%,-50%);
      background: radial-gradient(circle, rgba(244,63,94,.08) 0%, transparent 70%);
      animation: nebula-pulse 12s ease-in-out infinite;
    }
    @keyframes nebula-drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(60px,40px) scale(1.15); }
    }
    @keyframes nebula-pulse {
      0%,100% { opacity: .5; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 1;  transform: translate(-50%,-50%) scale(1.2); }
    }

    /* ── Particle canvas ────────────────────────────────────────────────── */
    #particle-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .55;
    }

    /* ── Layout wrapper ─────────────────────────────────────────────────── */
    .page-wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; min-height: 100vh;
    }
    main { flex: 1; padding-top: var(--nav-h); }

    /* ── Navbar ─────────────────────────────────────────────────────────── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h); z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 clamp(1.25rem, 4vw, 3rem);
      background: rgba(10,10,20,.72);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }
    .navbar.scrolled { background: rgba(10,10,20,.92); box-shadow: var(--shadow-card); }

    .nav-brand {
      display: flex; align-items: center; gap: .75rem;
      font-family: var(--font-display); font-size: 1.15rem;
      letter-spacing: .08em;
      background: var(--grad-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-brand-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--grad-primary);
      display: grid; place-items: center; font-size: .9rem; color: #fff;
      flex-shrink: 0;
    }

    .nav-links {
      display: flex; align-items: center; gap: .25rem;
      list-style: none;
    }
    .nav-links a {
      display: flex; align-items: center; gap: .45rem;
      padding: .45rem .85rem; border-radius: 8px;
      font-size: .82rem; font-weight: 500; letter-spacing: .03em;
      color: rgba(255,255,255,.6);
      transition: var(--transition);
    }
    .nav-links a:hover,
    .nav-links a.active {
      background: var(--surface-2);
      color: #fff;
    }
    .nav-links a.active { color: var(--indigo); }
    .nav-links i { font-size: .78rem; }

    .nav-right { display: flex; align-items: center; gap: .75rem; }

    .btn-nav-cta {
      padding: .45rem 1.1rem; border-radius: 8px;
      background: var(--grad-primary);
      color: #fff; font-size: .82rem; font-weight: 600;
      letter-spacing: .04em;
      box-shadow: 0 0 20px rgba(99,102,241,.3);
      transition: var(--transition);
    }
    .btn-nav-cta:hover { transform: translateY(-1px); box-shadow: 0 0 30px rgba(99,102,241,.5); }

    /* Hamburger */
    .nav-toggle {
      display: none; flex-direction: column; gap: 5px;
      width: 30px; padding: 4px; background: transparent; z-index: 101;
    }
    .nav-toggle span {
      display: block; height: 2px; border-radius: 2px;
      background: rgba(255,255,255,.7);
      transition: var(--transition);
    }
    .nav-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

    /* Mobile nav */
    .nav-mobile {
      display: none; position: fixed; top: var(--nav-h); left: 0; right: 0;
      background: rgba(10,10,20,.97); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem 1.5rem;
      flex-direction: column; gap: .25rem;
      z-index: 99;
    }
    .nav-mobile.open { display: flex; }
    .nav-mobile a {
      display: flex; align-items: center; gap: .6rem;
      padding: .8rem 1rem; border-radius: 10px;
      font-size: .9rem; color: rgba(255,255,255,.7);
      transition: var(--transition);
    }
    .nav-mobile a:hover { background: var(--surface-2); color: #fff; }

    /* ── Glass card ─────────────────────────────────────────────────────── */
    .glass {
      background: var(--surface);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }
    .glass-2 {
      background: var(--surface-2);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-2);
      border-radius: var(--radius-lg);
    }

    /* ── Buttons ────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: .55rem;
      padding: .75rem 1.6rem; border-radius: var(--radius);
      font-size: .9rem; font-weight: 600; letter-spacing: .04em;
      transition: var(--transition); cursor: pointer;
    }
    .btn-primary {
      background: var(--grad-primary); color: #fff;
      box-shadow: 0 0 24px rgba(99,102,241,.35);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 36px rgba(99,102,241,.55); }
    .btn-primary:active { transform: translateY(0); }
    .btn-ghost {
      background: var(--surface-2); color: rgba(255,255,255,.8);
      border: 1px solid var(--border-2);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.12); color: #fff; }
    .btn-danger {
      background: rgba(244,63,94,.15); color: var(--rose);
      border: 1px solid rgba(244,63,94,.25);
    }
    .btn-danger:hover { background: rgba(244,63,94,.25); }
    .btn-sm { padding: .5rem 1rem; font-size: .8rem; }
    .btn-lg { padding: 1rem 2.2rem; font-size: 1rem; }
    .btn[disabled] { opacity: .45; cursor: not-allowed; }

    /* ── Section helpers ────────────────────────────────────────────────── */
    .section { padding: clamp(3rem, 8vw, 6rem) clamp(1.25rem, 4vw, 3rem); }
    .container { max-width: 1200px; margin: 0 auto; }
    .container-sm { max-width: 760px; margin: 0 auto; }
    .container-lg { max-width: 1400px; margin: 0 auto; }

    .section-label {
      font-family: var(--font-mono); font-size: .72rem; letter-spacing: .2em;
      text-transform: uppercase; color: var(--indigo);
      display: flex; align-items: center; gap: .5rem; margin-bottom: .75rem;
    }
    .section-label::before {
      content: ''; width: 24px; height: 1px; background: var(--indigo);
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700; line-height: 1.15;
      letter-spacing: .02em;
    }
    .section-title .accent {
      background: var(--grad-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .section-sub {
      font-size: 1rem; font-weight: 300; line-height: 1.7;
      color: rgba(255,255,255,.55); margin-top: .75rem;
    }

    /* ── Animations ─────────────────────────────────────────────────────── */
    .fade-up {
      opacity: 0; transform: translateY(24px);
      animation: fade-up .6s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes fade-up {
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      opacity: 0; animation: fade-in .5s ease forwards;
    }
    @keyframes fade-in { to { opacity: 1; } }

    [data-reveal] {
      opacity: 0; transform: translateY(30px);
      transition: opacity .7s ease, transform .7s ease;
    }
    [data-reveal].revealed { opacity: 1; transform: translateY(0); }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    .float { animation: float 4s ease-in-out infinite; }

    @keyframes glow-pulse {
      0%,100% { box-shadow: 0 0 20px rgba(99,102,241,.3); }
      50%      { box-shadow: 0 0 40px rgba(99,102,241,.7); }
    }
    .glow-pulse { animation: glow-pulse 3s ease-in-out infinite; }

    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .shimmer {
      background: linear-gradient(90deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,.08) 50%,
        rgba(255,255,255,0) 100%
      );
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
    }

    /* ── Toast notifications ────────────────────────────────────────────── */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      z-index: 999; display: flex; flex-direction: column; gap: .75rem;
      pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: .75rem;
      padding: .85rem 1.25rem; border-radius: 12px;
      backdrop-filter: blur(20px);
      pointer-events: all;
      animation: toast-in .4s cubic-bezier(.4,0,.2,1) forwards;
      font-size: .85rem; font-weight: 500;
      max-width: 340px;
    }
    .toast.success { background: rgba(16,185,129,.18); border: 1px solid rgba(16,185,129,.35); color: #6ee7b7; }
    .toast.error   { background: rgba(244,63,94,.18); border: 1px solid rgba(244,63,94,.35); color: #fda4af; }
    .toast.info    { background: rgba(99,102,241,.18); border: 1px solid rgba(99,102,241,.35); color: #a5b4fc; }
    .toast.out     { animation: toast-out .35s ease forwards; }
    @keyframes toast-in  { from { opacity:0; transform: translateX(60px); } to { opacity:1; transform:translateX(0); } }
    @keyframes toast-out { to   { opacity:0; transform: translateX(60px); } }

    /* ── Loading overlay ────────────────────────────────────────────────── */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(10,10,20,.85); backdrop-filter: blur(8px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.5rem;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .loading-overlay.active { opacity: 1; pointer-events: all; }
    .loading-ring {
      width: 64px; height: 64px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.08);
      border-top-color: var(--indigo);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: var(--font-mono); font-size: .8rem; letter-spacing: .15em;
      color: rgba(255,255,255,.5);
    }

    /* ── Progress bar ───────────────────────────────────────────────────── */
    .progress-track {
      width: 100%; height: 6px; border-radius: 99px;
      background: rgba(255,255,255,.08); overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 99px;
      background: var(--grad-primary);
      transition: width 1s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    /* ── Badge ──────────────────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: .35rem;
      padding: .25rem .75rem; border-radius: 99px;
      font-size: .72rem; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase;
    }
    .badge-indigo  { background: rgba(99,102,241,.2);  color: #a5b4fc; border: 1px solid rgba(99,102,241,.3);  }
    .badge-violet  { background: rgba(139,92,246,.2);  color: #c4b5fd; border: 1px solid rgba(139,92,246,.3);  }
    .badge-rose    { background: rgba(244,63,94,.2);   color: #fda4af; border: 1px solid rgba(244,63,94,.3);   }
    .badge-amber   { background: rgba(245,158,11,.2);  color: #fcd34d; border: 1px solid rgba(245,158,11,.3);  }
    .badge-emerald { background: rgba(16,185,129,.2);  color: #6ee7b7; border: 1px solid rgba(16,185,129,.3);  }
    .badge-cyan    { background: rgba(6,182,212,.2);   color: #67e8f9; border: 1px solid rgba(6,182,212,.3);   }

    /* ── Divider ────────────────────────────────────────────────────────── */
    .divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-2), transparent);
      margin: 2rem 0;
    }

    /* ── Footer ─────────────────────────────────────────────────────────── */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      padding: 2rem clamp(1.25rem, 4vw, 3rem);
      background: rgba(10,10,20,.7);
      backdrop-filter: blur(12px);
    }
    .footer-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
    }
    .footer-brand {
      font-family: var(--font-display); font-size: .9rem;
      background: var(--grad-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .footer-copy {
      font-family: var(--font-mono); font-size: .7rem; letter-spacing: .1em;
      color: rgba(255,255,255,.3);
    }
    .footer-links { display: flex; gap: 1.25rem; }
    .footer-links a {
      font-size: .8rem; color: rgba(255,255,255,.4);
      transition: var(--transition);
    }
    .footer-links a:hover { color: var(--indigo); }

    /* ── Scrollbar ──────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--ink); }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,.4); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--indigo); }

    /* ── Responsive nav ─────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .nav-links, .btn-nav-cta { display: none; }
      .nav-toggle { display: flex; }
    }
    @media (min-width: 769px) { .nav-mobile { display: none !important; } }

    /* ── Utility ────────────────────────────────────────────────────────── */
    .text-center { text-align: center; }
    .text-muted  { color: rgba(255,255,255,.45); }
    .text-accent { color: var(--indigo); }
    .mt-1 { margin-top: .5rem; }  .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; } .mt-4 { margin-top: 2rem; }
    .mb-1 { margin-bottom: .5rem; } .mb-2 { margin-bottom: 1rem; }
    .gap-1 { gap: .5rem; } .gap-2 { gap: 1rem; } .gap-3 { gap: 1.5rem; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
    @media (max-width: 900px) { .grid-4 { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 600px) { .grid-2,.grid-3,.grid-4 { grid-template-columns: 1fr; } }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- Nebula background -->
  <div class="bg-nebula" aria-hidden="true"></div>
  <div class="bg-nebula-mid" aria-hidden="true"></div>
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <div class="page-wrap">

    <!-- ── Navbar ─────────────────────────────────────────────────────── -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
      <a href="/" class="nav-brand">
        <div class="nav-brand-icon"><i class="fa-solid fa-moon-stars"></i></div>
        Dream Visualizer
      </a>

      <ul class="nav-links" role="list">
        <li><a href="/" class="{% if active_page == 'home' %}active{% endif %}"><i class="fa-solid fa-house"></i> Home</a></li>
        <li><a href="/journal" class="{% if active_page == 'journal' %}active{% endif %}"><i class="fa-solid fa-book-open"></i> Journal</a></li>
        <li><a href="/dashboard" class="{% if active_page == 'dashboard' %}active{% endif %}"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
      </ul>

      <div class="nav-right">
        <a href="/" class="btn-nav-cta">
          <i class="fa-solid fa-sparkles"></i> New Dream
        </a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>

    <!-- Mobile nav -->
    <nav class="nav-mobile" id="nav-mobile" aria-label="Mobile navigation">
      <a href="/"><i class="fa-solid fa-house"></i> Home</a>
      <a href="/journal"><i class="fa-solid fa-book-open"></i> Dream Journal</a>
      <a href="/dashboard"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
    </nav>

    <!-- ── Page content ───────────────────────────────────────────────── -->
    <main id="main-content">
      {% block content %}{% endblock %}
    </main>

    <!-- ── Footer ─────────────────────────────────────────────────────── -->
    <footer>
      <div class="footer-inner">
        <span class="footer-brand">✦ Dream Visualizer AI</span>
        <div class="footer-links">
          <a href="/">Home</a>
          <a href="/journal">Journal</a>
          <a href="/dashboard">Dashboard</a>
        </div>
        <span class="footer-copy">© 2025 — DREAM VISUALIZER AI</span>
      </div>
    </footer>

  </div><!-- /page-wrap -->

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loading-overlay" role="status" aria-label="Loading">
    <div class="loading-ring"></div>
    <p class="loading-text" id="loading-text">PROCESSING DREAM…</p>
  </div>

  <!-- Shared JS utilities -->
  <script>
    /* ── Navbar scroll shadow ────────────────────────────────────────── */
    const nav = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 10);
    }, { passive: true });

    /* ── Mobile toggle ───────────────────────────────────────────────── */
    const toggle = document.getElementById('nav-toggle');
    const mobileNav = document.getElementById('nav-mobile');
    toggle.addEventListener('click', () => {
      const open = toggle.classList.toggle('open');
      mobileNav.classList.toggle('open', open);
      toggle.setAttribute('aria-expanded', open);
    });

    /* ── Toast ───────────────────────────────────────────────────────── */
    function showToast(msg, type = 'info', duration = 4000) {
      const icons = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info' };
      const tc = document.getElementById('toast-container');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<i class="fa-solid ${icons[type]}"></i><span>${msg}</span>`;
      tc.appendChild(t);
      setTimeout(() => {
        t.classList.add('out');
        t.addEventListener('animationend', () => t.remove());
      }, duration);
    }
    window.showToast = showToast;

    /* ── Loading overlay ─────────────────────────────────────────────── */
    function showLoading(msg = 'PROCESSING DREAM…') {
      document.getElementById('loading-text').textContent = msg;
      document.getElementById('loading-overlay').classList.add('active');
    }
    function hideLoading() {
      document.getElementById('loading-overlay').classList.remove('active');
    }
    window.showLoading = showLoading;
    window.hideLoading = hideLoading;

    /* ── Scroll reveal ───────────────────────────────────────────────── */
    const revealObs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('revealed'); } });
    }, { threshold: 0.12 });
    document.querySelectorAll('[data-reveal]').forEach(el => revealObs.observe(el));

    /* ── Animate progress bars when visible ─────────────────────────── */
    const barObs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const fill = e.target;
          const target = fill.dataset.value || '0';
          fill.style.width = target + '%';
        }
      });
    }, { threshold: 0.5 });
    document.querySelectorAll('.progress-fill').forEach(el => barObs.observe(el));
  </script>

  <!-- Particles -->
  <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
  <!-- Main app JS -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
